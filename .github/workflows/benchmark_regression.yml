name: Benchmark Regression

on:
  pull_request:
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dataset: [mm, mpc]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.28.x"

      - name: Install python dependencies
        run: >
          pip install cvxpy pandas matplotlib seaborn pyyaml

      - name: Run benchmark comparison on main and branch
        run: >
          python benchmarks/run_comparison.py benchmarks/configs/main.yml benchmarks/configs/branch.yml ./benchmarks/data/${{ matrix.dataset }}
        env:
          BRANCH_NAME: ${{ github.head_ref }}

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.dataset }}
          path: /tmp/results/

  report:
    needs: benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install -y gh

      - name: Authenticate GitHub CLI
        run: gh auth setup-git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install python dependencies
        run: pip install pandas

      - name: Download MM results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-mm
          path: /tmp/results/mm/

      - name: Download MPC results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-mpc
          path: /tmp/results/mpc/

      - name: Merge results
        run: |
          python - <<'EOF'
          import pandas as pd, os
          os.makedirs('/tmp/results', exist_ok=True)
          pd.concat([pd.read_csv('/tmp/results/mm/main.csv'),
                     pd.read_csv('/tmp/results/mpc/main.csv')]).to_csv('/tmp/results/main.csv', index=False)
          pd.concat([pd.read_csv('/tmp/results/mm/branch.csv'),
                     pd.read_csv('/tmp/results/mpc/branch.csv')]).to_csv('/tmp/results/branch.csv', index=False)
          EOF

      - name: Generate Regression Report
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python benchmarks/utils/regression_report.py /tmp/results/main.csv /tmp/results/branch.csv && cat /tmp/regression-report.txt

      - name: Upload regression report
        uses: actions/upload-artifact@v4
        with:
          name: regression-report
          path: /tmp/regression-report.txt

      - name: Comment on PR
        if: github.event.pull_request.head.repo.fork == false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/regression-report.txt
